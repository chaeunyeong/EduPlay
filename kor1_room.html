<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통글자 놀이방 - 에듀플레이</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        /* 1. 기본 설정: 여백 없애기 */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Jua', sans-serif;
            overflow: hidden; /* 스크롤바 없애기 */
            background-color: #fce4ec; /* 배경색 (파스텔 핑크) */
        }

        /* 2. 방 배경 이미지 설정 */
        .room-bg {
            width: 100vw; /* 화면 너비에 맞춤 */
            height: 100vh; /* 화면 높이에 맞춤 */
            /* 🌟 여기에 방금 저장한 배경 이미지 경로를 넣습니다! 확장자 확인! */
            background-image: url('images/room-kor-1.jfif');
            background-size: cover; /* 이미지가 잘려도 화면을 꽉 채움 */
            background-position: center; /* 이미지를 중앙에 맞춤 */
            position: relative; /* 자식 요소들의 기준점 */
        }

        /* 3. 돌아가기 버튼 디자인 */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.8);
            border: 2px solid #ff80ab;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Jua', sans-serif;
            font-size: 1.1rem;
            color: #c51162;
            transition: all 0.3s ease;
            text-decoration: none; /* 밑줄 없애기 */
        }

        .back-btn:hover {
            background-color: #ff80ab;
            color: white;
            transform: scale(1.05); /* 마우스 올리면 살짝 커짐 */
        }
    </style>
</head>
<body>

    <div class="room-bg">
        
        <a href="index.html" class="back-btn">⬅️ 마을로 돌아가기</a>

        </div>

</body>
</html>
