<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통글자 놀이방 - 에듀플레이</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        /* 1. 기본 설정 */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Jua', sans-serif;
            overflow: hidden;
            background-color: #fce4ec;
        }

        /* 2. 방 배경 이미지 설정 */
        .room-bg {
            width: 100vw;
            height: 100vh;
            background-image: url('images/kor/kor-1/bg.png');
            background-size: 100% 100%; /* 배경을 화면에 딱 맞게 고정 */
            background-position: center;
            position: relative;
        }

        /* 3. 돌아가기 버튼 */
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background-color: rgba(255, 255, 255, 0.8);
            border: 2px solid #ff80ab;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Jua', sans-serif;
            font-size: 1.1rem;
            color: #c51162;
            transition: all 0.3s ease;
            text-decoration: none;
            z-index: 100; /* 버튼이 꽃보다 위에 오도록 설정 */
        }

        .back-btn:hover {
            background-color: #ff80ab;
            color: white;
            transform: scale(1.05);
        }

        /* 4. 클릭할 꽃 아이템 디자인 */
        .flower-item {
            position: absolute;
            cursor: pointer;
            transition: transform 0.3s ease;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.2)); /* 부드러운 그림자 */
        }

        .flower-item:hover {
            transform: scale(1.1) rotate(5deg); /* 마우스 올리면 살짝 커지고 회전 */
        }

        /* 꽃의 크기를 일정하게 조절 (필요시 조정하세요) */
        .flower-item img {
            width: 140px; 
            height: auto;
        }
    </style>
</head>
<body>

    <div class="room-bg" id="item-container">
        <a href="index.html" class="back-btn">⬅️ 마을로 돌아가기</a>
        </div>

    <script>
        // 1. 각 꽃의 위치(좌표)와 연결될 게임 설정
        // left와 top은 % 단위입니다. 선생님의 배경 그림에 맞춰 숫자를 수정하세요!
        const flowerData = [
            { id: 1, left: "10%", top: "73%", game: "apple" },//외목대
            { id: 2, left: "13%", top: "65%", game: "desk" },//흰꽃
            { id: 3, left: "40%", top: "70%", game: "chair" },//회색화분
            { id: 4, left: "45%", top: "69%", game: "pencil" },//주황꽃
            { id: 5, left: "59%", top: "60%", game: "bag" },//보라꽃
            { id: 6, left: "64%", top: "60%", game: "book" },//노란꽃
            { id: 7, left: "68%", top: "60%", game: "melon" },//초록잎
            { id: 8, left: "85%", top: "65%", game: "bread" },//빨간꽃
            { id: 9, left: "25%", top: "62%", game: "milk" },//헹잉
            { id: 10, left: "90%", top: "75%", game: "water" }//흰화분
        ];

        const container = document.getElementById('item-container');

        // 2. 반복문을 사용하여 꽃들을 화면에 배치
        flowerData.forEach(data => {
            const flowerDiv = document.createElement('div');
            flowerDiv.className = 'flower-item';
            flowerDiv.style.left = data.left;
            flowerDiv.style.top = data.top;

            // 이미지 태그 생성 (경로: images/kor/kor-1/item_번호.png)
            flowerDiv.innerHTML = `<img src="images/kor/kor-1/item_${data.id}.png" alt="아이템${data.id}">`;

            // 클릭 이벤트 추가
            flowerDiv.onclick = function() {
                // 실제 게임 페이지로 이동하거나 게임 함수를 실행
                alert(data.game + " 게임을 시작합니다!");
                // window.location.href = `games/kor-1/${data.game}.html`; // 실제 경로 예시
            };

            container.appendChild(flowerDiv);
        });
    </script>

</body>
</html>
